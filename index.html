<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소시오톡 (SocioTalk) - 사상가 대담</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #333;
    }

    .app-container {
      width: 100%;
      max-width: 900px;
      height: 85vh;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      display: flex;
      overflow: hidden;
    }

    /* 사이드바 - 사상가 선택 및 유저 프로필 */
    .sidebar {
      width: 300px;
      background: #2c3e50;
      color: #ecf0f1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e0e0e0;
    }

    .auth-section {
      padding: 20px;
      background: #1a252f;
      text-align: center;
      border-bottom: 1px solid #34495e;
    }

    .auth-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3498db;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .auth-btn:hover { background: #2980b9; }
    .auth-btn.logout { background: #e74c3c; }
    .auth-btn.logout:hover { background: #c0392b; }

    .user-info {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .thinker-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px 10px;
    }

    .thinker-list h3 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-left: 10px;
      color: #7f8c8d;
    }

    .thinker-item {
      display: flex;
      align-items: center;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .thinker-item:hover {
      background: #34495e;
    }

    .thinker-item.active {
      background: #3498db;
    }

    .thinker-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #bdc3c7;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      margin-right: 12px;
      color: #2c3e50;
    }

    .thinker-info .name {
      font-weight: bold;
      font-size: 15px;
      display: block;
    }

    .thinker-info .keyword {
      font-size: 12px;
      color: #bdc3c7;
    }

    /* 메인 채팅 영역 */
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f8f9fa;
    }

    .chat-header {
      padding: 20px;
      background: white;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .chat-header p {
      margin: 4px 0 0 0;
      font-size: 13px;
      color: #666;
    }

    .save-note-btn {
      padding: 8px 14px;
      border: 1px solid #3498db;
      border-radius: 20px;
      background: transparent;
      color: #3498db;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      display: none;
    }

    .save-note-btn:hover {
      background: #3498db;
      color: white;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 75%;
      display: flex;
      flex-direction: column;
    }

    .message.bot {
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      position: relative;
    }

    .bot .msg-bubble {
      background: white;
      border: 1px solid #e9ecef;
      border-top-left-radius: 4px;
    }

    .user .msg-bubble {
      background: #3498db;
      color: white;
      border-top-right-radius: 4px;
    }

    .tts-btn {
      align-self: flex-start;
      margin-top: 5px;
      background: none;
      border: none;
      color: #7f8c8d;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .tts-btn:hover { color: #2c3e50; }

    .chat-input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e9ecef;
      display: flex;
      gap: 10px;
    }

    .chat-input-area input {
      flex: 1;
      padding: 14px;
      border: 1px solid #ced4da;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }

    .chat-input-area button {
      padding: 0 20px;
      border: none;
      border-radius: 12px;
      background: #2c3e50;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .chat-input-area button:hover { background: #1a252f; }

    /* 학급 피드 탭 공간 */
    .feed-container {
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      height: 100%;
    }

    .feed-card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #e9ecef;
    }

    .tabs {
      display: flex;
      background: #eaeded;
      padding: 5px;
      border-radius: 10px;
      margin: 10px 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 8px;
      font-weight: bold;
      color: #7f8c8d;
    }

    .tab-btn.active {
      background: white;
      color: #2c3e50;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="sidebar">
      <div class="auth-section" id="authSection">
        <div class="user-info" id="userInfo">로그인이 필요합니다.</div>
        <button class="auth-btn" id="authBtn" onclick="toggleAuth()">구글 로그인 시뮬레이션</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="tabChat" onclick="switchTab('chat')">사상가 대담</button>
        <button class="tab-btn" id="tabFeed" onclick="switchTab('feed')">학급 연구노트</button>
      </div>

      <div class="thinker-list" id="thinkerList">
        <h3>사상가 라인업</h3>
      </div>
    </div>

    <!-- 메인 대화창 탭 -->
    <div class="main-chat" id="chatWindow">
      <div class="chat-header">
        <div>
          <h2 id="activeName">사상가를 선택해주세요</h2>
          <p id="activeIntro">선택한 사상가의 사상으로 현대 사회를 진단합니다.</p>
        </div>
        <button class="save-note-btn" id="saveNoteBtn" onclick="saveToFirestore()">연구노트에 스크랩</button>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="message bot">
          <div class="msg-bubble">안녕하세요! 소시오톡에 오신 것을 환영합니다. 왼쪽에서 대담을 나누고 싶은 과거의 위대한 사상가를 선택해 주세요.</div>
        </div>
      </div>

      <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="현대 사회의 이슈(예: 저출생, 자본주의 등)를 질문해 보세요..." onkeypress="if(event.key==='Enter') sendMessage()" disabled/>
        <button onclick="sendMessage()" id="sendBtn" disabled>전송</button>
      </div>
    </div>

    <!-- 피드 탭 -->
    <div class="main-chat" id="feedWindow" style="display:none;">
      <div class="chat-header">
        <div>
          <h2>학급 연구노트 공유 피드</h2>
          <p>우리 반 학생들이 사상가들과 대담 후 공유한 실시간 생각 데이터입니다.</p>
        </div>
      </div>
      <div class="feed-container" id="feedContainer" style="display: flex;">
        <!-- 가상 데이터 렌더링 영역 -->
      </div>
    </div>
  </div>

  <script>
    // --- 데이터 정의 ---
    const thinkers = {
      hobbes: { name: '토마스 홉스', keyword: '사회계약설 / 국가 통제', intro: '강력한 법과 국가(리바이어던)의 수호자', avatar: '👑',
        reply: (q) => `인간은 본래 이기적인 존재라 법과 강력한 통제력이 없다면 '만인의 만인에 대한 투쟁' 상태에 빠집니다. 질문하신 '${q}' 현상 역시 인간의 무분별한 이기심이 규제받지 않아 사회적 무질서를 낳은 결과입니다. 이를 해결하려면 강력한 주권(정부/규제)이 개입하여 사회 계약의 약속을 강제해야만 평화가 유지됩니다.` },
      kant: { name: '임마누엘 칸트', keyword: '의무론 / 정언명령', intro: '보편적 도덕 법칙과 인간 존엄성의 수호자', avatar: '⚖️',
        reply: (q) => `사회가 아무리 변해도 타협할 수 없는 '보편적 도덕 원칙'이 있습니다. '${q}'의 문제를 마주할 때, 우리는 이익이나 효율성보다 '인간을 수단이 아닌 목적으로 대하고 있는가?'를 먼저 물어야 합니다. 모든 이성적 인간이 의무감으로 지켜야 할 정언명령에 입각해 올바른 행동 준칙을 세우는 것만이 유일한 해결책입니다.` },
      marx: { name: '카를 마르크스', keyword: '갈등론 / 자본주의 비판', intro: '구조적 불평등을 타파하려는 혁명가', avatar: '🚩',
        reply: (q) => `사회의 본질은 지배 계급과 피지배 계급 간의 끊임없는 권력 투쟁입니다! 당신이 말한 '${q}' 현상은 결국 자본주의 구조가 낳은 불평등과 생산수단의 독점 때문입니다. 겉모습에 속지 마십시오. 이 모순을 해결하려면 기득권 위주의 구조적 시스템을 근본적으로 변혁하고, 소외당하는 노동자와 약자 중심의 평등한 경제적 연대를 구축해야 합니다.` },
      durkheim: { name: '에밀 뒤르켐', keyword: '기능론 / 사회 통합', intro: '사회적 사실과 연대를 탐구하는 학자', avatar: '🧩',
        reply: (q) => `사회는 하나의 거대한 유기체와 같습니다. 각 기관이 조화를 이루어야 건강하죠. '${q}'(은)는 사회적 규범이 약화되어 기준이 무너진 '아노미(Anomie)' 상태이거나, 연대감이 상실되어 발생하는 일시적인 병리 현상입니다. 도덕적 교육을 강화하고 공동체의 결속력을 다져 사회적 합의를 다시 이끌어내야 유기체가 안정됩니다.` },
      weber: { name: '막스 베버', keyword: '이해사회학 / 관료제', intro: '가치중립과 합리성의 냉철한 분석가', avatar: '☕',
        reply: (q) => `현대 사회는 고도의 효율성을 추구하다가 도리어 계산적이고 차가운 '관료제라는 거대한 철창'에 갇히고 있습니다. '${q}' 현상도 현대 사회가 급격히 목적 합리성 구조로 재편되면서 나타나는 문화적 징후입니다. 우리는 가치중립적인 태도로 이 현상의 이면(주체적 행동의 의미)을 냉철히 이해(Verstehen)해야 합니다.` }
    };

    let currentThinkerId = null;
    let isLoggedIn = false;
    let userName = "";

    let fakeFirestore = [
      { name: "김철수", thinker: "카를 마르크스", topic: "청년 취업난", content: "취업난을 계급 간 불평등으로 해석하는 점이 신선했다." },
      { name: "이영희", thinker: "임마누엘 칸트", topic: "인공지능 윤리", content: "AI 시대에도 인간의 존엄성은 수단이 될 수 없다는 교훈." }
    ];

    // --- 사상가 목록 UI 초기화 ---
    const thinkerList = document.getElementById('thinkerList');
    Object.keys(thinkers).forEach(id => {
      const t = thinkers[id];
      const div = document.createElement('div');
      div.className = 'thinker-item';
      div.id = `thinker-${id}`;
      div.onclick = () => selectThinker(id);
      div.innerHTML = `
        <div class="thinker-avatar">${t.avatar}</div>
        <div class="thinker-info">
          <span class="name">${t.name}</span>
          <span class="keyword">${t.keyword}</span>
        </div>
      `;
      thinkerList.appendChild(div);
    });

    // --- 사상가 선택 기능 ---
    function selectThinker(id) {
      currentThinkerId = id;
      document.querySelectorAll('.thinker-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`thinker-${id}`).classList.add('active');

      const t = thinkers[id];
      document.getElementById('activeName').innerText = t.name;
      document.getElementById('activeIntro').innerText = t.intro;
      
      document.getElementById('userInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;

      // 첫 환영 인사말 변경 및 자동 소리 재생
      const welcomeText = `반갑네, 나는 ${t.name}이라네. 자네는 오늘날 우리 사회의 어떤 점 혹은 어떤 모순에 대해 나와 깊이 논해보고 싶은가? 편하게 묻게나.`;
      
      document.getElementById('chatMessages').innerHTML = `
        <div class="message bot">
          <div class="msg-bubble">${welcomeText}</div>
          <button class="tts-btn" onclick="speakText(this.previousElementSibling.innerText)">🔊 오디오로 듣기</button>
        </div>
      `;
      speakText(welcomeText);
      checkSaveBtnVisibility();
    }

    // --- 로그인 토글 시뮬레이터 ---
    function toggleAuth() {
      const authBtn = document.getElementById('authBtn');
      const userInfo = document.getElementById('userInfo');

      if (!isLoggedIn) {
        isLoggedIn = true;
        userName = "홍길동 학생";
        userInfo.innerText = `👋 환영합니다, ${userName}!`;
        authBtn.innerText = "로그아웃";
        authBtn.classList.add('logout');
      } else {
        isLoggedIn = false;
        userName = "";
        userInfo.innerText = "로그인이 필요합니다.";
        authBtn.innerText = "구글 로그인 시뮬레이션";
        authBtn.classList.remove('logout');
      }
      checkSaveBtnVisibility();
    }

    function checkSaveBtnVisibility() {
      const saveBtn = document.getElementById('saveNoteBtn');
      if (isLoggedIn && currentThinkerId) {
        saveBtn.style.display = 'block';
      } else {
        saveBtn.style.display = 'none';
      }
    }

    // --- 유저 메시지 전송 및 답변 생성 ---
    function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text || !currentThinkerId) return;

      appendMessage(text, 'user');
      input.value = '';

      // 답변 로딩 상태 연출
      const chatMessages = document.getElementById('chatMessages');
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'message bot';
      loadingDiv.innerHTML = `<div class="msg-bubble" style="color:#aaa;">답변을 고민하는 중...</div>`;
      chatMessages.appendChild(loadingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      setTimeout(() => {
        chatMessages.removeChild(loadingDiv);
        const replyText = thinkers[currentThinkerId].reply(text);
        appendMessage(replyText, 'bot');
      }, 1000);
    }

    // --- ⭐ 메시지 화면 노출 및 자동 TTS 스크립트 반영 영역 ---
    function appendMessage(text, sender) {
      const chatMessages = document.getElementById('chatMessages');
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;
      
      if (sender === 'bot') {
        msgDiv.innerHTML = `
          <div class="msg-bubble">${text}</div>
          <button class="tts-btn" onclick="speakText(this.previousElementSibling.innerText)">🔊 오디오로 듣기</button>
        `;
        // 사상가의 답변이 추가되는 즉시 음성 자동 재생 실행
        speakText(text); 
      } else {
        msgDiv.innerHTML = `<div class="msg-bubble">${text}</div>`;
      }
      
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // --- TTS (Text-to-Speech) 핵심 엔진 ---
    function speakText(text) {
      if ('speechSynthesis' in window) {
        // 이전에 재생 중이던 음성이 있다면 겹치지 않도록 먼저 멈춤
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR';
        utterance.rate = 1.0; 
        utterance.pitch = 0.9; // 사상가 풍의 중후한 목소리 톤

        window.speechSynthesis.speak(utterance);
      } else {
        console.warn("이 브라우저는 음성 합성(TTS) 기능을 지원하지 않습니다.");
      }
    }

    // --- 데이터 저장 시뮬레이션 ---
    function saveToFirestore() {
      if (!isLoggedIn) return;
      
      const chatMessages = document.getElementById('chatMessages').getElementsByClassName('msg-bubble');
      if (chatMessages.length < 3) {
        alert("사상가와 1회 이상 대화를 주고받은 뒤 스크랩이 가능합니다.");
        return;
      }

      const lastUserQuestion = chatMessages[1].innerText;
      const lastBotAnswer = chatMessages[2].innerText;

      const newRecord = {
        name: userName,
        thinker: thinkers[currentThinkerId].name,
        topic: lastUserQuestion.substring(0, 15) + "...",
        content: lastBotAnswer.substring(0, 60) + "..."
      };

      fakeFirestore.unshift(newRecord);
      renderFeed();
      alert(`${thinkers[currentThinkerId].name}님과의 대담 리포트가 '학급 연구노트 피드'에 실시간 업로드되었습니다.`);
    }

    function renderFeed() {
      const container = document.getElementById('feedContainer');
      container.innerHTML = '';
      fakeFirestore.forEach(item => {
        container.innerHTML += `
          <div class="feed-card">
            <strong style="color:#3498db;">[${item.thinker}]</strong> 
            <span style="font-size:13px; color:#7f8c8d; float:right;">작성자: ${item.name}</span>
            <h4 style="margin:8px 0; color:#2c3e50;">탐구 주제: "${item.topic}"</h4>
            <p style="margin:0; font-size:14px; color:#555; line-height:1.4;">${item.content}</p>
          </div>
        `;
      });
    }

    // 탭 전환 유틸리티
    function switchTab(tab) {
      const chatWin = document.getElementById('chatWindow');
      const feedWin = document.getElementById('feedWindow');
      const tabChat = document.getElementById('tabChat');
      const tabFeed = document.getElementById('tabFeed');

      if (tab === 'chat') {
        chatWin.style.display = 'flex';
        feedWin.style.display = 'none';
        tabChat.classList.add('active');
        tabFeed.classList.remove('active');
      } else {
        chatWin.style.display = 'none';
        feedWin.style.display = 'flex';
        tabChat.classList.remove('active');
        tabFeed.classList.add('active');
        renderFeed();
      }
    }

    // 시작 시 공유 피드 로드
    renderFeed();
  </script>
</body>
</html>
