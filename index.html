<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소시오톡 (SocioTalk) - 사상가 대담</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #333;
    }

    .app-container {
      width: 100%;
      max-width: 900px;
      height: 85vh;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      display: flex;
      overflow: hidden;
    }

    /* 사이드바 - 사상가 선택 및 유저 프로필 */
    .sidebar {
      width: 300px;
      background: #2c3e50;
      color: #ecf0f1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e0e0e0;
    }

    .auth-section {
      padding: 20px;
      background: #1a252f;
      text-align: center;
      border-bottom: 1px solid #34495e;
    }

    .auth-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3498db;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .auth-btn:hover { background: #2980b9; }
    .auth-btn.logout { background: #e74c3c; }
    .auth-btn.logout:hover { background: #c0392b; }

    .user-info {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .thinker-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px 10px;
    }

    .thinker-list h3 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-left: 10px;
      color: #7f8c8d;
    }

    .thinker-item {
      display: flex;
      align-items: center;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .thinker-item:hover { background: #34495e; }
    .thinker-item.active { background: #3498db; }

    .thinker-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #bdc3c7;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      margin-right: 12px;
      color: #2c3e50;
    }

    .thinker-info .name {
      font-weight: bold;
      font-size: 15px;
      display: block;
    }

    .thinker-info .keyword {
      font-size: 12px;
      color: #bdc3c7;
    }

    /* 메인 채팅 영역 */
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f8f9fa;
    }

    .chat-header {
      padding: 20px;
      background: white;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .chat-header p {
      margin: 4px 0 0 0;
      font-size: 13px;
      color: #666;
    }

    /* 🔒 API 키 입력 공간 스타일 */
    .api-key-area {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .api-key-area input {
      padding: 8px 12px;
      border: 1px solid #ced4da;
      border-radius: 8px;
      font-size: 13px;
      width: 180px;
      outline: none;
    }

    .save-note-btn {
      padding: 8px 14px;
      border: 1px solid #3498db;
      border-radius: 20px;
      background: transparent;
      color: #3498db;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      display: none;
    }

    .save-note-btn:hover {
      background: #3498db;
      color: white;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 75%;
      display: flex;
      flex-direction: column;
    }

    .message.bot { align-self: flex-start; }
    .message.user { align-self: flex-end; }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      position: relative;
    }

    .bot .msg-bubble {
      background: white;
      border: 1px solid #e9ecef;
      border-top-left-radius: 4px;
    }

    .user .msg-bubble {
      background: #3498db;
      color: white;
      border-top-right-radius: 4px;
    }

    .tts-btn {
      align-self: flex-start;
      margin-top: 5px;
      background: none;
      border: none;
      color: #7f8c8d;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .tts-btn:hover { color: #2c3e50; }

    .chat-input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e9ecef;
      display: flex;
      gap: 10px;
    }

    .chat-input-area input {
      flex: 1;
      padding: 14px;
      border: 1px solid #ced4da;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }

    .chat-input-area button {
      padding: 0 20px;
      border: none;
      border-radius: 12px;
      background: #2c3e50;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .chat-input-area button:hover { background: #1a252f; }

    /* 학급 피드 탭 공간 */
    .feed-container {
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      height: 100%;
    }

    .feed-card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #e9ecef;
    }

    .tabs {
      display: flex;
      background: #eaeded;
      padding: 5px;
      border-radius: 10px;
      margin: 10px 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 8px;
      font-weight: bold;
      color: #7f8c8d;
    }

    .tab-btn.active {
      background: white;
      color: #2c3e50;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="sidebar">
      <div class="auth-section" id="authSection">
        <div class="user-info" id="userInfo">로그인이 필요합니다.</div>
        <button class="auth-btn" id="authBtn" onclick="toggleAuth()">구글 로그인 시뮬레이션</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="tabChat" onclick="switchTab('chat')">사상가 대담</button>
        <button class="tab-btn" id="tabFeed" onclick="switchTab('feed')">학급 연구노트</button>
      </div>

      <div class="thinker-list" id="thinkerList">
        <h3>사상가 라인업</h3>
      </div>
    </div>

    <div class="main-chat" id="chatWindow">
      <div class="chat-header">
        <div>
          <h2 id="activeName">사상가를 선택해주세요</h2>
          <p id="activeIntro">선택한 사상가의 사상으로 현대 사회를 진단합니다.</p>
        </div>
        
        <div class="api-key-area">
          <input type="password" id="apiKeyInput" placeholder="Gemini API Key 입력" />
          <button class="save-note-btn" id="saveNoteBtn" onclick="saveToFirestore()" style="display:none; margin-left: 10px;">연구노트에 스크랩</button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="message bot">
          <div class="msg-bubble">안녕하세요! 소시오톡에 오신 것을 환영합니다. 먼저 우측 상단에 발급받으신 <strong>API Key를 입력</strong>하신 후, 대담을 나누고 싶은 사상가를 선택해 주세요.</div>
        </div>
      </div>

      <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="현대 사회의 이슈(예: 저출생, 자본주의 등)를 질문해 보세요..." onkeypress="if(event.key==='Enter') sendMessage()" disabled/>
        <button onclick="sendMessage()" id="sendBtn" disabled>전송</button>
      </div>
    </div>

    <div class="main-chat" id="feedWindow" style="display:none;">
      <div class="chat-header">
        <div>
          <h2>학급 연구노트 공유 피드</h2>
          <p>우리 반 학생들이 사상가들과 대담 후 공유한 실시간 생각 데이터입니다.</p>
        </div>
      </div>
      <div class="feed-container" id="feedContainer" style="display: flex;">
        </div>
    </div>
  </div>

  <script>
    // --- 데이터 정의 ---
    const thinkers = {
      hobbes: { name: '토마스 홉스', keyword: '사회계약설 / 국가 통제', intro: '강력한 법과 국가(리바이어던)의 수호자', avatar: '👑' },
      kant: { name: '임마누엘 칸트', keyword: '의무론 / 정언명령', intro: '보편적 도덕 법칙과 인간 존엄성의 수호자', avatar: '⚖️' },
      marx: { name: '카를 마르크스', keyword: '갈등론 / 자본주의 비판', intro: '구조적 불평등을 타파하려는 혁명가', avatar: '🚩' },
      durkheim: { name: '에밀 뒤르켐', keyword: '기능론 / 사회 통합', intro: '사회적 사실과 연대를 탐구하는 학자', avatar: '🧩' },
      weber: { name: '막스 베버', keyword: '이해사회학 / 관료제', intro: '가치중립과 합리성의 냉철한 분석가', avatar: '☕' }
    };

    let currentThinkerId = null;
    let isLoggedIn = false;
    let userName = "";

    let fakeFirestore = [
      { name: "김철수", thinker: "카를 마르크스", topic: "청년 취업난", content: "취업난을 계급 간 불평등으로 해석하는 점이 신선했다." },
      { name: "이영희", thinker: "임마누엘 칸트", topic: "인공지능 윤리", content: "AI 시대에도 인간의 존엄성은 수단이 될 수 없다는 교훈." }
    ];

    // --- 사상가 목록 UI 초기화 ---
    const thinkerList = document.getElementById('thinkerList');
    Object.keys(thinkers).forEach(id => {
      const t = thinkers[id];
      const div = document.createElement('div');
      div.className = 'thinker-item';
      div.id = `thinker-${id}`;
      div.onclick = () => selectThinker(id);
      div.innerHTML = `
        <div class="thinker-avatar">${t.avatar}</div>
        <div class="thinker-info">
          <span class="name">${t.name}</span>
          <span class="keyword">${t.keyword}</span>
        </div>
      `;
      thinkerList.appendChild(div);
    });

    // --- 사상가 선택 기능 ---
    function selectThinker(id) {
      currentThinkerId = id;
      document.querySelectorAll('.thinker-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`thinker-${id}`).classList.add('active');

      const t = thinkers[id];
      document.getElementById('activeName').innerText = t.name;
      document.getElementById('activeIntro').innerText = t.intro;
      
      document.getElementById('userInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;

      const welcomeText = `반갑네, 나는 ${t.name}이라네. 자네는 오늘날 우리 사회의 어떤 모순이나 현상에 대해 나와 철학적 대담을 나누고 싶은가? 편하게 질문하게나.`;
      
      document.getElementById('chatMessages').innerHTML = `
        <div class="message bot">
          <div class="msg-bubble">${welcomeText}</div>
          <button class="tts-btn" onclick="speakText(this.previousElementSibling.innerText)">🔊 오디오로 듣기</button>
        </div>
      `;
      speakText(welcomeText);
      checkSaveBtnVisibility();
    }

    // --- 로그인 토글 시뮬레이터 ---
    function toggleAuth() {
      const authBtn = document.getElementById('authBtn');
      const userInfo = document.getElementById('userInfo');

      if (!isLoggedIn) {
        isLoggedIn = true;
        userName = "홍길동 학생";
        userInfo.innerText = `👋 환영합니다, ${userName}!`;
        authBtn.innerText = "로그아웃";
        authBtn.classList.add('logout');
      } else {
        isLoggedIn = false;
        userName = "";
        userInfo.innerText = "로그인이 필요합니다.";
        authBtn.innerText = "구글 로그인 시뮬레이션";
        authBtn.classList.remove('logout');
      }
      checkSaveBtnVisibility();
    }

    function checkSaveBtnVisibility() {
      const saveBtn = document.getElementById('saveNoteBtn');
      if (isLoggedIn && currentThinkerId) {
        saveBtn.style.display = 'block';
      } else {
        saveBtn.style.display = 'none';
      }
    }

    // --- 🤖 실제 생성형 AI API 호출 및 전송 기능 ---
    function sendMessage() {
      const input = document.getElementById('userInput');
      const apiKey = document.getElementById('apiKeyInput').value.trim();
      const text = input.value.trim();
      
      if (!text || !currentThinkerId) return;

      // API 키 미입력 시 경고
      if (!apiKey) {
        alert("화면 상단의 'API Key 입력창'에 발급받으신 키를 입력하셔야 실시간 사상가 대화가 작동합니다.");
        return;
      }

      // 1. 화면에 유저 메시지 노출
      appendMessage(text, 'user');
      input.value = '';

      // 2. 사상가 로딩 메시지 연출
      const chatMessages = document.getElementById('chatMessages');
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'message bot';
      loadingDiv.innerHTML = `<div class="msg-bubble" style="color:#aaa;">생각을 가다듬는 중...</div>`;
      chatMessages.appendChild(loadingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      const thinker = thinkers[currentThinkerId];

      // 3. Google Gemini API 호출 설정 (발표용/학습용 무료 연동에 최적)
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
      
      const systemInstruction = `당신은 위대한 사상가 [${thinker.name}]입니다. 당신의 철학적 키워드는 [${thinker.keyword}]이며, 핵심 정체성은 [${thinker.intro}]입니다. 21세기 현대 사회의 이슈에 대해 철저히 자신만의 철학적 관점과 정중하고 고풍스러운 사상가의 말투로 한국어로 답변해 주세요. 질문을 철학적으로 해부하고 명쾌한 사회적 진단을 내려주어야 합니다.`;

      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: `${systemInstruction}\n\n질문: ${text}` }] }]
        })
      })
      .then(res => {
        if (!res.ok) throw new Error("API Key가 유효하지 않거나 오류가 발생했습니다.");
        return res.json();
      })
      .then(data => {
        chatMessages.removeChild(loadingDiv);
        
        // Gemini API 응답 구조에서 텍스트 추출
        const replyText = data.candidates[0].content.parts[0].text;
        appendMessage(replyText, 'bot');
      })
      .catch(error => {
        chatMessages.removeChild(loadingDiv);
        console.error(error);
        appendMessage("미안하네, 내 생각을 정리하는 도중 문제가 생겼구려. 상단의 API Key가 정상적인지 확인해 보게나.", 'bot');
      });

      /* 💡 만약 OpenAI(ChatGPT) API를 사용하고 싶다면 위 fetch 부분을 아래로 교체하세요:
      fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [
            { role: 'system', content: `당신은 사상가 ${thinker.name}입니다...` },
            { role: 'user', content: text }
          ]
        })
      })
      */
    }

    // --- 메시지 화면 추가 및 자동 TTS 연동 ---
    function appendMessage(text, sender) {
      const chatMessages = document.getElementById('chatMessages');
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;
      
      if (sender === 'bot') {
        msgDiv.innerHTML = `
          <div class="msg-bubble">${text}</div>
          <button class="tts-btn" onclick="speakText(this.previousElementSibling.innerText)">🔊 오디오로 듣기</button>
        `;
        speakText(text); // 답변 생성 즉시 자동 목소리 재생
      } else {
        msgDiv.innerHTML = `<div class="msg-bubble">${text}</div>`;
      }
      
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // --- TTS (Text-to-Speech) 오디오 재생 기능 ---
    function speakText(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); // 이전 소리 중지
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ko-KR';
        utterance.rate = 1.0; 
        utterance.pitch = 0.85; // 중후한 느낌의 톤 세팅

        window.speechSynthesis.speak(utterance);
      }
    }

    // --- 연구노트 스크랩 데이터 저장 시뮬레이션 ---
    function saveToFirestore() {
      if (!isLoggedIn) return;
      
      const chatMessages = document.getElementById('chatMessages').getElementsByClassName('msg-bubble');
      if (chatMessages.length < 3) {
        alert("사상가와 최소 1회 이상 실시간 대화를 주고받은 뒤 스크랩이 가능합니다.");
        return;
      }

      const lastUserQuestion = chatMessages[1].innerText;
      const lastBotAnswer = chatMessages[2].innerText;

      const newRecord = {
        name: userName,
        thinker: thinkers[currentThinkerId].name,
        topic: lastUserQuestion.substring(0, 15) + "...",
        content: lastBotAnswer.substring(0, 60) + "..."
      };

      fakeFirestore.unshift(newRecord);
      renderFeed();
      alert(`${thinkers[currentThinkerId].name}님과의 대담 리포트가 '학급 연구노트 피드'에 실시간 업로드되었습니다.`);
    }

    function renderFeed() {
      const container = document.getElementById('feedContainer');
      container.innerHTML = '';
      fakeFirestore.forEach(item => {
        container.innerHTML += `
          <div class="feed-card">
            <strong style="color:#3498db;">[${item.thinker}]</strong> 
            <span style="font-size:13px; color:#7f8c8d; float:right;">작성자: ${item.name}</span>
            <h4 style="margin:8px 0; color:#2c3e50;">탐구 주제: "${item.topic}"</h4>
            <p style="margin:0; font-size:14px; color:#555; line-height:1.4;">${item.content}</p>
          </div>
        `;
      });
    }

    function switchTab(tab) {
      const chatWin = document.getElementById('chatWindow');
      const feedWin = document.getElementById('feedWindow');
      const tabChat = document.getElementById('tabChat');
      const tabFeed = document.getElementById('tabFeed');

      if (tab === 'chat') {
        chatWin.style.display = 'flex';
        feedWin.style.display = 'none';
        tabChat.classList.add('active');
        tabFeed.classList.remove('active');
      } else {
        chatWin.style.display = 'none';
        feedWin.style.display = 'flex';
        tabChat.classList.remove('active');
        tabFeed.classList.add('active');
        renderFeed();
      }
    }

    renderFeed();
  </script>
</body>
</html>
