<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소시오톡 (SocioTalk) - 사상가 대담</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #333;
    }

    .app-container {
      width: 100%;
      max-width: 900px;
      height: 85vh;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      display: flex;
      overflow: hidden;
    }

    /* 사이드바 - 사상가 선택 및 유저 프로필 */
    .sidebar {
      width: 300px;
      background: #2c3e50;
      color: #ecf0f1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e0e0e0;
    }

    .auth-section {
      padding: 20px;
      background: #1a252f;
      text-align: center;
      border-bottom: 1px solid #34495e;
    }

    .auth-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3498db;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .auth-btn:hover { background: #2980b9; }
    .auth-btn.logout { background: #e74c3c; }
    .auth-btn.logout:hover { background: #c0392b; }

    .user-info {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .thinker-list {
      flex: 1;
      overflow-y: auto;
      padding: 15px 10px;
    }

    .thinker-list h3 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-left: 10px;
      color: #7f8c8d;
    }

    .thinker-item {
      display: flex;
      align-items: center;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .thinker-item:hover { background: #34495e; }
    .thinker-item.active { background: #3498db; }

    .thinker-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #bdc3c7;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      margin-right: 12px;
      color: #2c3e50;
    }

    .thinker-info .name {
      font-weight: bold;
      font-size: 15px;
      display: block;
    }

    .thinker-info .keyword {
      font-size: 12px;
      color: #bdc3c7;
    }

    /* 메인 채팅 영역 */
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f8f9fa;
    }

    .chat-header {
      padding: 20px;
      background: white;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .chat-header p {
      margin: 4px 0 0 0;
      font-size: 13px;
      color: #666;
    }

    /* API 키 입력 공간 스타일 */
    .api-key-area {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .api-key-area input {
      padding: 8px 12px;
      border: 1px solid #ced4da;
      border-radius: 8px;
      font-size: 13px;
      width: 180px;
      outline: none;
    }
