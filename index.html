<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소시오톡 (Firebase + Apps Script 통합본)</title>
  <style>
    * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      display: flex; justify-content: center; align-items: center; padding: 20px;
    }
    .container {
      width: min(800px, 100%); background: #ffffff;
      border-radius: 24px; padding: 30px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
    }
    h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
    .hidden { display: none !important; }
    
    /* 인증 폼 */
    .auth-box {
      max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px;
      padding: 20px; background: #f8f9fa; border-radius: 18px; border: 1px solid #e9ecef;
    }
    input, select {
      height: 46px; padding: 0 14px; border: 1px solid #ddd; border-radius: 12px;
      font-size: 15px; outline: none; width: 100%; margin-bottom: 5px;
    }
    input:focus, select:focus { border-color: #42a5f5; box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.15); }
    button {
      border: none; border-radius: 12px; padding: 0 16px; height: 46px;
      font-size: 15px; cursor: pointer; font-weight: bold; transition: 0.2s;
    }
    button:hover { transform: translateY(-2px); opacity: 0.9; }
    .primary-btn { background: #42a5f5; color: white; }
    .secondary-btn { background: #7e57c2; color: white; }
    .danger-btn { background: #ef5350; color: white; height: 38px; }

    /* 상단 바 */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; background: #f1f3f5; border-radius: 16px; margin-bottom: 20px;
    }
    
    /* 대화 입력 창 */
    .talk-box {
      background: #f8f9fa; padding: 20px; border-radius: 18px; margin-bottom: 20px;
      display: flex; flex-direction: column; gap: 10px;
    }

    /* 기록 리스트 */
    .chat-list { display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; margin-top: 15px; }
    .chat-item { background: #f1f3f5; padding: 15px; border-radius: 16px; border-left: 5px solid #7e57c2; position: relative; }
    .chat-q { font-weight: bold; color: #2c3e50; margin: 0 0 5px 0; }
    .chat-a { color: #555; margin: 0; line-height: 1.5; white-space: pre-wrap; }
    .chat-meta { font-size: 11px; color: #999; margin-top: 8px; }
    .delete-chat-btn { position: absolute; right: 15px; top: 15px; background: none; color: #ef5350; height: auto; padding: 0; font-size: 12px;}
    .status { color: #e67e22; font-weight: bold; font-size: 14px; margin: 10px 0; min-height: 20px; text-align: center;}
  </style>
</head>
<body>

  <div class="container">
    <h1>🎓 소시오톡 AI 하이브리드</h1>

    <section id="authSection">
      <div class="auth-box">
        <h2>보안 로그인 / 가입</h2>
        <input id="emailInput" type="email" placeholder="이메일 주소" />
        <input id="passwordInput" type="password" placeholder="비밀번호 (6자리 이상)" />
        <button class="primary-btn" id="loginBtn">로그인</button>
        <button class="secondary-btn" id="signupBtn">신규 회원가입</button>
      </div>
    </section>

    <section id="mainSection" class="hidden">
      <div class="top-bar">
        <div>👤 <strong id="userEmail"></strong> 님 접속중</div>
        <button class="danger-btn" id="logoutBtn">로그아웃</button>
      </div>

      <div class="talk-box">
        <h3>사상가에게 질문하기</h3>
        <select id="thinkerSelect">
          <option value="weber">막스 베버 (이해사회학 / 관료제) 🧔 [남성음]</option>
          <option value="hobbes">토마스 홉스 (사회계약설 / 국가통제) 👴</option>
          <option value="kant">임마누엘 칸트 (의무론 / 정언명령) 👨‍🏫</option>
          <option value="marx">카를 마르크스 (갈등론 / 자본주의비판) 🧔</option>
          <option value="durkheim">에밀 뒤르켐 (기능론 / 사회통합) 👨‍⚕️</option>
        </select>
        <input id="questionInput" type="text" placeholder="철학자에게 던질 사회적 질문을 입력하세요" />
        <button class="primary-btn" id="sendBtn">생각 묻기 & 목소리 듣기</button>
      </div>

      <div id="status" class="status"></div>

      <h3>📜 대화 기록 보관소 (Firebase)</h3>
      <div id="chatList" class="chat-list"></div>
    </section>
  </div>
